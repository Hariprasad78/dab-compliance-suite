name: Generate Version and Build Artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_info.outputs.VERSION_STRING }}
    steps:
      - name: Get current date and run number for versioning
        id: version_info
        run: |
          DATE_CODE=$(date +'%y%m%d')
          RUN_NUMBER_PADDED=$(printf "%02d" $((GITHUB_RUN_NUMBER % 100)))
          VERSION_STRING="${DATE_CODE}${RUN_NUMBER_PADDED}"
          echo "VERSION_STRING=${VERSION_STRING}" >> $GITHUB_OUTPUT

  source:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test_version.txt
        run: |
          echo "${{ needs.version.outputs.version }}" > test_version.txt
          cat test_version.txt

      - name: Zip source repository for existing artifact flow
        run: |
          zip -r dab-compliance-suite.zip . \
            -x ".git/*" \
            -x "dab-compliance-suite.zip" \
            -x "dab-compliance-suite-*.zip"

      - name: Upload existing source zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: dab-compliance-suite
          path: dab-compliance-suite.zip

  binary:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dab-compliance-suite-linux-x64.zip
          - os: macos-13
            artifact_name: dab-compliance-suite-macos-x64.zip
          - os: macos-14
            artifact_name: dab-compliance-suite-macos-arm64.zip
          - os: windows-latest
            artifact_name: dab-compliance-suite-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test_version.txt
        shell: bash
        run: |
          echo "${{ needs.version.outputs.version }}" > test_version.txt
          cat test_version.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install binary build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build standalone binary bundle
        env:
          BINARY_ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: python scripts/build_binary.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs:
      - version
      - source
      - binary
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          find artifacts -type f -name "*.zip" -exec cp {} . \;
          ls -lh *.zip

      - name: Create update manifest
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/test-${VERSION}"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          base_url = os.environ["BASE_URL"]
          assets = {}
          for path in sorted(Path(".").glob("dab-compliance-suite-*.zip")):
              if path.name == "dab-compliance-suite.zip":
                  continue
              sha256 = hashlib.sha256(path.read_bytes()).hexdigest()
              platform = path.stem.removeprefix("dab-compliance-suite-")
              assets[platform] = {
                  "url": f"{base_url}/{path.name}",
                  "sha256": sha256,
              }
          manifest = {"latest": version, "versions": {version: {"assets": assets}}}
          Path("update-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/test-${{ needs.version.outputs.version }}

      - name: Upload update manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dab-compliance-update-manifest
          path: update-manifest.json

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-${{ needs.version.outputs.version }}
          name: DAB Compliance Suite ${{ needs.version.outputs.version }}
          body: |
            Test tool version ${{ needs.version.outputs.version }}.

            The existing source zip artifact remains available.
            Standalone binary bundles include Python dependencies.
            Users do not need to run pip install after downloading them.
          files: |
            dab-compliance-suite.zip
            dab-compliance-suite-linux-x64.zip
            dab-compliance-suite-macos-x64.zip
            dab-compliance-suite-macos-arm64.zip
            dab-compliance-suite-windows-x64.zip
            update-manifest.json
